services:
  dashboard:
    build: .
    image: agentlab:local
    container_name: agentlab-dashboard
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      AGENTLAB_DB: /data/runs.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - agentlab-data:/data
    command: ["serve", "--port", "8787", "--db", "/data/runs.db"]

volumes:
  agentlab-data:
